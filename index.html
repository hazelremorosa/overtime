<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Overtime Record Generator</title>
        <link rel="manifest" href="manifest.json" />
        <meta name="theme-color" content="#6366f1" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <link rel="apple-touch-icon" href="icon-192.svg" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <style>
            :root {
                --accent: #6366f1;
                --accent-hover: #4f46e5;
                --green: #10b981;
                --green-hover: #059669;
                --red: #ef4444;
                --red-hover: #dc2626;
                --gray-50: #f9fafb;
                --gray-100: #f3f4f6;
                --gray-200: #e5e7eb;
                --gray-300: #d1d5db;
                --gray-400: #9ca3af;
                --gray-500: #6b7280;
                --gray-600: #4b5563;
                --gray-700: #374151;
                --gray-800: #1f2937;
                --gray-900: #111827;
                --radius: 12px;
                --shadow: 0 1px 3px rgba(0, 0, 0, 0.06),
                    0 4px 16px rgba(0, 0, 0, 0.06);
                --shadow-lg: 0 4px 12px rgba(0, 0, 0, 0.08),
                    0 16px 40px rgba(0, 0, 0, 0.12);
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: "Inter", system-ui, -apple-system, sans-serif;
                background: var(--gray-50);
                color: var(--gray-800);
                padding: 32px 16px;
                min-height: 100vh;
            }

            /* ---- Header ---- */
            .app-header {
                max-width: 740px;
                margin: 0 auto 28px;
                text-align: center;
            }
            .app-header h1 {
                font-size: 26px;
                font-weight: 700;
                color: var(--gray-900);
                letter-spacing: -0.5px;
            }
            .app-header p {
                margin-top: 6px;
                font-size: 14px;
                color: var(--gray-500);
            }

            /* ---- Card ---- */
            .card {
                max-width: 740px;
                margin: 0 auto 20px;
                background: #fff;
                padding: 24px;
                border-radius: var(--radius);
                box-shadow: var(--shadow);
                border: 1px solid var(--gray-200);
            }
            .card-title {
                font-size: 14px;
                font-weight: 600;
                color: var(--gray-500);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 16px;
            }

            /* ---- Form ---- */
            .form-row {
                display: flex;
                gap: 14px;
                margin-bottom: 14px;
                flex-wrap: wrap;
            }
            .form-row label {
                display: flex;
                flex-direction: column;
                flex: 1;
                font-size: 13px;
                font-weight: 500;
                color: var(--gray-600);
                min-width: 140px;
            }
            .form-row input {
                margin-top: 6px;
                padding: 10px 12px;
                border: 1.5px solid var(--gray-200);
                border-radius: 8px;
                font-size: 14px;
                font-family: inherit;
                color: var(--gray-800);
                background: var(--gray-50);
                transition: border-color 0.2s, box-shadow 0.2s;
            }
            .form-row input:focus {
                outline: none;
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
                background: #fff;
            }

            /* ---- Buttons ---- */
            button {
                padding: 10px 22px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 600;
                font-family: inherit;
                color: #fff;
                background: var(--accent);
                transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            }
            button:hover {
                background: var(--accent-hover);
                box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
            }
            button:active {
                transform: scale(0.97);
            }
            button.green {
                background: var(--green);
            }
            button.green:hover {
                background: var(--green-hover);
                box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
            }
            button.cancel {
                background: var(--gray-100);
                color: var(--gray-700);
            }
            button.cancel:hover {
                background: var(--gray-200);
                box-shadow: none;
            }

            /* ---- Entry table ---- */
            .entry-table {
                display: none;
            }
            .entry-table table {
                width: 100%;
                border-collapse: separate;
                border-spacing: 0;
                font-size: 13px;
            }
            .entry-table thead th {
                background: var(--gray-100);
                padding: 10px 12px;
                text-align: center;
                font-weight: 600;
                font-size: 12px;
                color: var(--gray-500);
                text-transform: uppercase;
                letter-spacing: 0.4px;
                border-bottom: 2px solid var(--gray-200);
            }
            .entry-table thead th:first-child {
                border-radius: 8px 0 0 0;
            }
            .entry-table thead th:last-child {
                border-radius: 0 8px 0 0;
            }
            .entry-table td {
                padding: 8px 10px;
                text-align: center;
                border-bottom: 1px solid var(--gray-100);
                vertical-align: middle;
                color: var(--gray-700);
            }
            .entry-table tbody tr {
                transition: background 0.15s;
            }
            .entry-table tbody tr:hover {
                background: rgba(99, 102, 241, 0.03);
            }
            .entry-table input[type="time"],
            .entry-table input[type="text"] {
                border: 1.5px solid var(--gray-200);
                border-radius: 6px;
                padding: 7px 10px;
                font-size: 13px;
                font-family: inherit;
                width: 100%;
                color: var(--gray-800);
                background: var(--gray-50);
                transition: border-color 0.2s, box-shadow 0.2s;
            }
            .entry-table input[type="time"]:focus,
            .entry-table input[type="text"]:focus {
                outline: none;
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
                background: #fff;
            }
            .entry-table .hours-cell {
                font-weight: 600;
                font-size: 13px;
                color: var(--accent);
            }
            .entry-table .btn-remove {
                background: none;
                color: var(--gray-400);
                border: none;
                border-radius: 6px;
                padding: 6px 10px;
                cursor: pointer;
                font-size: 18px;
                font-weight: 400;
                line-height: 1;
                transition: color 0.2s, background 0.2s;
                box-shadow: none;
            }
            .entry-table .btn-remove:hover {
                color: var(--red);
                background: rgba(239, 68, 68, 0.08);
                box-shadow: none;
            }
            .total-row td {
                font-weight: 700;
                padding-top: 14px;
                border-bottom: none;
                font-size: 14px;
                color: var(--gray-800);
            }
            .total-row .total-value {
                color: var(--accent);
                font-size: 15px;
            }

            /* ---- Actions bar ---- */
            .actions {
                max-width: 740px;
                margin: 0 auto;
                text-align: center;
                display: none;
            }

            /* ---- Modal ---- */
            .modal-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.4);
                backdrop-filter: blur(4px);
                -webkit-backdrop-filter: blur(4px);
                z-index: 1000;
                justify-content: center;
                align-items: center;
                animation: fadeIn 0.2s ease;
            }
            .modal-overlay.open {
                display: flex;
            }
            .modal {
                background: #fff;
                border-radius: 16px;
                padding: 28px;
                max-width: 600px;
                width: 92%;
                max-height: 90vh;
                overflow-y: auto;
                box-shadow: var(--shadow-lg);
                text-align: center;
                animation: slideUp 0.25s ease;
            }
            .modal h2 {
                font-size: 18px;
                font-weight: 700;
                color: var(--gray-900);
                margin-bottom: 20px;
            }
            .modal img {
                max-width: 100%;
                border: 1px solid var(--gray-200);
                border-radius: 8px;
            }
            .modal-buttons {
                display: flex;
                gap: 12px;
                justify-content: center;
                margin-top: 22px;
            }
            .modal-buttons button {
                min-width: 130px;
            }

            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }
            @keyframes slideUp {
                from { opacity: 0; transform: translateY(16px) scale(0.97); }
                to { opacity: 1; transform: translateY(0) scale(1); }
            }

            /* ---- Render target (off-screen, unchanged) ---- */
            #render-target {
                position: absolute;
                left: -9999px;
                top: 0;
                width: 540px;
                background: #fff;
                padding: 12px 8px;
                font-family: Arial, sans-serif;
                font-size: 12px;
                color: #000;
            }
            #render-target table {
                width: 100%;
                border-collapse: collapse;
                border-left: 1.5px solid #000;
                border-right: 1.5px solid #000;
                border-bottom: 1.5px solid #000;
            }
            #render-target th,
            #render-target td {
                border: 1px solid #000;
                padding: 4px 6px;
                text-align: center;
                font-size: 11px;
            }
            #render-target th {
                font-weight: 700;
            }
            #render-target .title {
                text-align: center;
                font-weight: 700;
                font-size: 13px;
                margin-bottom: 6px;
                border-top: 1.5px solid #000;
                border-left: 1.5px solid #000;
                border-right: 1.5px solid #000;
                padding: 6px 0 2px;
            }
            #render-target .info {
                font-size: 12px;
                font-weight: 700;
                padding: 2px 6px;
                border-left: 1.5px solid #000;
                border-right: 1.5px solid #000;
            }
            #render-target .footer {
                margin-top: 14px;
                font-size: 12px;
                border-left: 1.5px solid #000;
                border-right: 1.5px solid #000;
                border-bottom: 1.5px solid #000;
                padding: 6px;
            }
            #render-target .footer div:first-child {
                margin-bottom: 2px;
            }
            #render-target .footer .name {
                font-weight: 700;
            }
        </style>
    </head>
    <body>
        <!-- Header -->
        <div class="app-header">
            <h1>Overtime Record Generator</h1>
            <p>Fill in details, adjust your entries, then generate a downloadable image.</p>
        </div>

        <!-- Controls -->
        <div class="card">
            <div class="card-title">Employee Details</div>
            <div class="form-row">
                <label
                    >Employee Name<input
                        type="text"
                        id="empName"
                        placeholder="John Doe"
                /></label>
                <label
                    >Position<input
                        type="text"
                        id="empPosition"
                        placeholder="e.g. Draftsman"
                /></label>
            </div>
            <div class="card-title" style="margin-top: 20px">Date Range</div>
            <div class="form-row">
                <label>Start Date<input type="date" id="startDate" /></label>
                <label>End Date<input type="date" id="endDate" /></label>
            </div>
            <div style="margin-top: 8px">
                <button id="btnGenRows">Generate Rows</button>
            </div>
        </div>

        <!-- Editable entry table -->
        <div class="card entry-table" id="entrySection">
            <div class="card-title">Overtime Entries</div>
            <table>
                <thead>
                    <tr>
                        <th style="width: 110px">Date</th>
                        <th style="width: 120px">End Time</th>
                        <th style="width: 120px">No. of Hours</th>
                        <th>Notes</th>
                        <th style="width: 50px"></th>
                    </tr>
                </thead>
                <tbody id="entryBody"></tbody>
                <tfoot>
                    <tr class="total-row">
                        <td colspan="2" style="text-align: right">TOTAL</td>
                        <td class="total-value" id="totalHours">0 HOURS</td>
                        <td colspan="2"></td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <!-- Action buttons -->
        <div class="actions" id="actionsSection">
            <button class="green" id="btnGenImage">Generate Image</button>
        </div>

        <!-- Preview modal -->
        <div class="modal-overlay" id="previewModal">
            <div class="modal">
                <h2>Preview</h2>
                <img id="previewImg" src="" alt="Preview" />
                <div class="modal-buttons">
                    <button class="cancel" id="btnCancel">Cancel</button>
                    <button class="green" id="btnDownload">Download</button>
                </div>
            </div>
        </div>

        <!-- Off-screen render target for html2canvas -->
        <div id="render-target"></div>

        <script>
            const OT_START_HOUR = 17; // 5:00 PM

            document
                .getElementById("btnGenRows")
                .addEventListener("click", generateRows);
            document
                .getElementById("btnGenImage")
                .addEventListener("click", generateImage);

            function generateRows() {
                const start = document.getElementById("startDate").value;
                const end = document.getElementById("endDate").value;
                if (!start || !end) {
                    alert("Please select both start and end dates.");
                    return;
                }

                const startD = new Date(start + "T00:00:00");
                const endD = new Date(end + "T00:00:00");
                if (endD < startD) {
                    alert("End date must be on or after start date.");
                    return;
                }

                const tbody = document.getElementById("entryBody");
                tbody.innerHTML = "";

                const cur = new Date(startD);
                while (cur <= endD) {
                    const dateStr = formatDateUS(cur);
                    addRow(tbody, dateStr);
                    cur.setDate(cur.getDate() + 1);
                }

                recalcAll();

                document.getElementById("entrySection").style.display = "block";
                document.getElementById("actionsSection").style.display =
                    "block";
            }

            function addRow(tbody, dateStr) {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${dateStr}</td>
                    <td><input type="time" class="end-time" value="20:00"></td>
                    <td class="hours-cell"></td>
                    <td><input type="text" class="notes-input" placeholder=""></td>
                    <td><button class="btn-remove" title="Remove this date">&times;</button></td>
                `;
                tr.querySelector(".end-time").addEventListener(
                    "input",
                    recalcAll,
                );
                tr.querySelector(".btn-remove").addEventListener(
                    "click",
                    () => {
                        tr.remove();
                        recalcAll();
                    },
                );
                tbody.appendChild(tr);
            }

            function recalcAll() {
                let total = 0;
                document.querySelectorAll("#entryBody tr").forEach((tr) => {
                    const cell = tr.querySelector(".hours-cell");
                    const timeInput = tr.querySelector(".end-time");
                    if (!timeInput.value) {
                        cell.textContent = "";
                        return;
                    }
                    const [h, m] = timeInput.value.split(":").map(Number);
                    const endMin = h * 60 + m;
                    const startMin = OT_START_HOUR * 60;
                    let diff = endMin - startMin;
                    if (diff <= 0) {
                        cell.textContent = "";
                        return;
                    }
                    const hours = diff / 60;
                    total += hours;
                    cell.textContent = hours + " HOURS";
                });
                document.getElementById("totalHours").textContent =
                    total + " HOURS";
            }

            function formatDateUS(d) {
                return (
                    d.getMonth() + 1 + "/" + d.getDate() + "/" + d.getFullYear()
                );
            }

            function formatTimeRange(timeVal) {
                const [h, m] = timeVal.split(":").map(Number);
                const fmtStart = "5:00";
                const fmtEnd =
                    String(h).padStart(2, "0") +
                    ":" +
                    String(m).padStart(2, "0");
                return fmtStart + "-" + fmtEnd;
            }

            function generateImage() {
                const name =
                    document.getElementById("empName").value || "EMPLOYEE NAME";
                const position =
                    document.getElementById("empPosition").value || "Position";

                const rows = [];
                document.querySelectorAll("#entryBody tr").forEach((tr) => {
                    const timeInput = tr.querySelector(".end-time");
                    if (!timeInput.value) return;
                    const [h, m] = timeInput.value.split(":").map(Number);
                    const diff = h * 60 + m - OT_START_HOUR * 60;
                    if (diff <= 0) return;
                    const date = tr.children[0].textContent;
                    const hours = diff / 60;
                    const notes = tr.querySelector(".notes-input").value;
                    rows.push({
                        date,
                        time: formatTimeRange(timeInput.value),
                        hours,
                        notes,
                    });
                });

                const totalHours = rows.reduce((s, r) => s + r.hours, 0);

                // Build render target HTML
                const target = document.getElementById("render-target");
                let html = "";
                html += `<div class="title">OVER TIME RECORD</div>`;
                html += `<div class="info">EMPLOYEE NAME: ${escHtml(name.toUpperCase())}</div>`;
                html += `<div class="info">Position: ${escHtml(position)}</div>`;
                html += `<table>`;
                html += `<thead><tr><th style="width:100px">DATE</th><th style="width:120px">TIME</th><th style="width:120px">NO.OF HOURS</th><th>NOTES</th></tr></thead>`;
                html += `<tbody>`;
                rows.forEach((r) => {
                    html += `<tr><td>${r.date}</td><td>${r.time}</td><td>${r.hours} HOURS</td><td style="text-align:left;padding-left:10px">${escHtml(r.notes)}</td></tr>`;
                });
                const minRows = 4;
                for (let i = rows.length; i < minRows; i++) {
                    html += `<tr><td>&nbsp;</td><td></td><td></td><td></td></tr>`;
                }
                html += `<tr><td></td><td style="font-weight:700">TOTAL</td><td style="font-weight:700">${totalHours} HOURS</td><td></td></tr>`;
                html += `</tbody></table>`;
                html += `<div class="footer"><div>Prepared by:</div><div class="name">${escHtml(name.toUpperCase())}</div></div>`;

                target.innerHTML = html;

                html2canvas(target, {
                    scale: 2,
                    backgroundColor: "#ffffff",
                }).then((canvas) => {
                    const dataUrl = canvas.toDataURL("image/png");
                    document.getElementById("previewImg").src = dataUrl;
                    document
                        .getElementById("previewModal")
                        .classList.add("open");

                    document.getElementById("btnDownload").onclick = () => {
                        const link = document.createElement("a");
                        link.download = "overtime-record.png";
                        link.href = dataUrl;
                        link.click();
                        document
                            .getElementById("previewModal")
                            .classList.remove("open");
                    };
                });
            }

            document
                .getElementById("btnCancel")
                .addEventListener("click", () => {
                    document
                        .getElementById("previewModal")
                        .classList.remove("open");
                });

            document
                .getElementById("previewModal")
                .addEventListener("click", (e) => {
                    if (e.target === e.currentTarget) {
                        e.currentTarget.classList.remove("open");
                    }
                });

            function escHtml(str) {
                const d = document.createElement("div");
                d.textContent = str;
                return d.innerHTML;
            }

            // Register service worker
            if ("serviceWorker" in navigator) {
                navigator.serviceWorker.register("./sw.js");
            }
        </script>
    </body>
</html>
