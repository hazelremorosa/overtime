<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Overtime Record Generator</title>
        <link rel="manifest" href="manifest.json" />
        <meta name="theme-color" content="#6366f1" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <link rel="apple-touch-icon" href="icon-192.svg" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <style>
            :root {
                --accent: #6366f1;
                --accent-hover: #4f46e5;
                --green: #10b981;
                --green-hover: #059669;
                --red: #ef4444;
                --red-hover: #dc2626;
                --gray-50: #f9fafb;
                --gray-100: #f3f4f6;
                --gray-200: #e5e7eb;
                --gray-300: #d1d5db;
                --gray-400: #9ca3af;
                --gray-500: #6b7280;
                --gray-600: #4b5563;
                --gray-700: #374151;
                --gray-800: #1f2937;
                --gray-900: #111827;
                --radius: 12px;
                --shadow:
                    0 1px 3px rgba(0, 0, 0, 0.06),
                    0 4px 16px rgba(0, 0, 0, 0.06);
                --shadow-lg:
                    0 4px 12px rgba(0, 0, 0, 0.08),
                    0 16px 40px rgba(0, 0, 0, 0.12);
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family:
                    "Inter",
                    system-ui,
                    -apple-system,
                    sans-serif;
                background: var(--gray-50);
                color: var(--gray-800);
                padding: 32px 16px;
                min-height: 100vh;
            }

            /* ---- Header ---- */
            .app-header {
                max-width: 740px;
                margin: 0 auto 28px;
                text-align: center;
            }
            .app-header h1 {
                font-size: 26px;
                font-weight: 700;
                color: var(--gray-900);
                letter-spacing: -0.5px;
            }
            .app-header p {
                margin-top: 6px;
                font-size: 14px;
                color: var(--gray-500);
            }

            /* ---- Card ---- */
            .card {
                max-width: 740px;
                margin: 0 auto 20px;
                background: #fff;
                padding: 24px;
                border-radius: var(--radius);
                box-shadow: var(--shadow);
                border: 1px solid var(--gray-200);
            }
            .card-title {
                font-size: 14px;
                font-weight: 600;
                color: var(--gray-500);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 16px;
            }

            /* ---- Form ---- */
            .form-row {
                display: flex;
                gap: 14px;
                margin-bottom: 14px;
                flex-wrap: wrap;
            }
            .form-row label {
                display: flex;
                flex-direction: column;
                flex: 1;
                font-size: 13px;
                font-weight: 500;
                color: var(--gray-600);
                min-width: 140px;
            }
            .form-row input,
            .form-row select {
                margin-top: 6px;
                padding: 10px 12px;
                border: 1.5px solid var(--gray-200);
                border-radius: 8px;
                font-size: 14px;
                font-family: inherit;
                color: var(--gray-800);
                background: var(--gray-50);
                transition:
                    border-color 0.2s,
                    box-shadow 0.2s;
            }
            .form-row input:focus,
            .form-row select:focus {
                outline: none;
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
                background: #fff;
            }
            .form-row .custom-name-input {
                display: none;
            }
            .form-row .custom-name-input.visible {
                display: block;
            }

            /* ---- Buttons ---- */
            button {
                padding: 10px 22px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 600;
                font-family: inherit;
                color: #fff;
                background: var(--accent);
                transition:
                    background 0.2s,
                    transform 0.1s,
                    box-shadow 0.2s;
            }
            button:hover {
                background: var(--accent-hover);
                box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
            }
            button:active {
                transform: scale(0.97);
            }
            button.green {
                background: var(--green);
            }
            button.green:hover {
                background: var(--green-hover);
                box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
            }
            button.cancel {
                background: var(--gray-100);
                color: var(--gray-700);
            }
            button.cancel:hover {
                background: var(--gray-200);
                box-shadow: none;
            }

            /* ---- Entry table ---- */
            .entry-table {
                display: none;
            }
            .entry-table table {
                width: 100%;
                border-collapse: separate;
                border-spacing: 0;
                font-size: 13px;
            }
            .entry-table thead th {
                background: var(--gray-100);
                padding: 10px 12px;
                text-align: center;
                font-weight: 600;
                font-size: 12px;
                color: var(--gray-500);
                text-transform: uppercase;
                letter-spacing: 0.4px;
                border-bottom: 2px solid var(--gray-200);
            }
            .entry-table thead th:first-child {
                border-radius: 8px 0 0 0;
            }
            .entry-table thead th:last-child {
                border-radius: 0 8px 0 0;
            }
            .entry-table td {
                padding: 8px 10px;
                text-align: center;
                border-bottom: 1px solid var(--gray-100);
                vertical-align: middle;
                color: var(--gray-700);
            }
            .entry-table tbody tr {
                transition: background 0.15s;
            }
            .entry-table tbody tr:hover {
                background: rgba(99, 102, 241, 0.03);
            }
            .entry-table input[type="text"] {
                border: 1.5px solid var(--gray-200);
                border-radius: 6px;
                padding: 7px 10px;
                font-size: 13px;
                font-family: inherit;
                width: 100%;
                color: var(--gray-800);
                background: var(--gray-50);
                transition:
                    border-color 0.2s,
                    box-shadow 0.2s;
            }
            .entry-table input[type="text"]:focus {
                outline: none;
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
                background: #fff;
            }
            .time-picker {
                display: flex;
                align-items: center;
                gap: 2px;
            }
            .time-picker select {
                border: 1.5px solid var(--gray-200);
                border-radius: 6px;
                padding: 7px 4px;
                font-size: 13px;
                font-family: inherit;
                color: var(--gray-800);
                background: var(--gray-50);
                transition:
                    border-color 0.2s,
                    box-shadow 0.2s;
                -webkit-appearance: none;
                appearance: none;
                text-align: center;
            }
            .time-picker select:focus {
                outline: none;
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
                background: #fff;
            }
            .time-picker .time-sep {
                font-weight: 600;
                color: var(--gray-500);
            }
            .entry-table .hours-cell {
                font-weight: 600;
                font-size: 13px;
                color: var(--accent);
            }
            .entry-table .btn-remove {
                background: none;
                color: var(--gray-400);
                border: none;
                border-radius: 6px;
                padding: 6px 10px;
                cursor: pointer;
                font-size: 18px;
                font-weight: 400;
                line-height: 1;
                transition:
                    color 0.2s,
                    background 0.2s;
                box-shadow: none;
            }
            .entry-table .btn-remove:hover {
                color: var(--red);
                background: rgba(239, 68, 68, 0.08);
                box-shadow: none;
            }
            .total-row td {
                font-weight: 700;
                padding-top: 14px;
                border-bottom: none;
                font-size: 14px;
                color: var(--gray-800);
            }
            .total-row .total-value {
                color: var(--accent);
                font-size: 15px;
            }

            /* ---- Actions bar ---- */
            .actions {
                max-width: 740px;
                margin: 0 auto;
                text-align: center;
                display: none;
            }

            /* ---- Modal ---- */
            .modal-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.4);
                backdrop-filter: blur(4px);
                -webkit-backdrop-filter: blur(4px);
                z-index: 1000;
                justify-content: center;
                align-items: center;
                animation: fadeIn 0.2s ease;
            }
            .modal-overlay.open {
                display: flex;
            }
            .modal {
                background: #fff;
                border-radius: 16px;
                padding: 28px;
                max-width: 600px;
                width: 92%;
                max-height: 90vh;
                overflow-y: auto;
                box-shadow: var(--shadow-lg);
                text-align: center;
                animation: slideUp 0.25s ease;
            }
            .modal h2 {
                font-size: 18px;
                font-weight: 700;
                color: var(--gray-900);
                margin-bottom: 20px;
            }
            .modal img {
                max-width: 100%;
                border: 1px solid var(--gray-200);
                border-radius: 8px;
            }
            .modal-buttons {
                display: flex;
                gap: 12px;
                justify-content: center;
                margin-top: 22px;
            }
            .modal-buttons button {
                min-width: 130px;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(16px) scale(0.97);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }

            /* ---- Render target (off-screen, unchanged) ---- */
            #render-target {
                position: absolute;
                left: -9999px;
                top: 0;
                width: 540px;
                background: #fff;
                padding: 12px 8px;
                font-family: Arial, sans-serif;
                font-size: 12px;
                color: #000;
            }
            #render-target table {
                width: 100%;
                border-collapse: collapse;
                border-left: 1.5px solid #000;
                border-right: 1.5px solid #000;
                border-bottom: 1.5px solid #000;
            }
            #render-target th,
            #render-target td {
                border: 1px solid #000;
                padding: 4px 6px;
                text-align: center;
                font-size: 11px;
            }
            #render-target th {
                font-weight: 700;
            }
            #render-target .title {
                text-align: center;
                font-weight: 700;
                font-size: 13px;
                margin-bottom: 6px;
                border-top: 1.5px solid #000;
                border-left: 1.5px solid #000;
                border-right: 1.5px solid #000;
                padding: 6px 0 2px;
            }
            #render-target .info {
                font-size: 12px;
                font-weight: 700;
                padding: 2px 6px;
                border-left: 1.5px solid #000;
                border-right: 1.5px solid #000;
            }
            #render-target .footer {
                margin-top: 14px;
                font-size: 12px;
                border-left: 1.5px solid #000;
                border-right: 1.5px solid #000;
                border-bottom: 1.5px solid #000;
                padding: 6px;
            }
            #render-target .footer div:first-child {
                margin-bottom: 2px;
            }
            #render-target .footer .name {
                font-weight: 700;
            }
            /* ---- History ---- */
            .history-list {
                list-style: none;
                margin-top: 12px;
            }
            .history-item {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 10px 12px;
                border: 1px solid var(--gray-200);
                border-radius: 8px;
                margin-bottom: 8px;
                background: var(--gray-50);
                transition: background 0.15s;
            }
            .history-item:hover {
                background: #fff;
            }
            .history-item-info {
                flex: 1;
                min-width: 0;
            }
            .history-item-name {
                font-weight: 600;
                font-size: 14px;
                color: var(--gray-800);
            }
            .history-item-meta {
                font-size: 12px;
                color: var(--gray-500);
                margin-top: 2px;
            }
            .history-item-actions {
                display: flex;
                gap: 6px;
                flex-shrink: 0;
                margin-left: 12px;
            }
            .history-item-actions button {
                padding: 6px 12px;
                font-size: 12px;
            }
            .history-empty {
                font-size: 13px;
                color: var(--gray-400);
                text-align: center;
                padding: 16px 0;
            }

            /* ---- Toast ---- */
            .toast {
                position: fixed;
                top: 24px;
                left: 50%;
                transform: translateX(-50%) translateY(-20px);
                background: var(--gray-900);
                color: #fff;
                padding: 12px 24px;
                border-radius: 10px;
                font-size: 14px;
                font-weight: 500;
                font-family: inherit;
                box-shadow: 0 8px 24px rgba(0,0,0,0.18);
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.25s, transform 0.25s;
                z-index: 9999;
            }
            .toast.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
                pointer-events: auto;
            }
            .toast.toast-error {
                background: var(--red);
            }
            .toast.toast-success {
                background: var(--green);
            }

            /* ---- Confirm dialog ---- */
            .confirm-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.35);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 9998;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.2s;
            }
            .confirm-overlay.open {
                opacity: 1;
                pointer-events: auto;
            }
            .confirm-box {
                background: #fff;
                border-radius: var(--radius);
                padding: 28px 24px 20px;
                max-width: 360px;
                width: 90%;
                box-shadow: var(--shadow-lg);
                text-align: center;
            }
            .confirm-box p {
                font-size: 15px;
                color: var(--gray-800);
                margin-bottom: 20px;
                line-height: 1.5;
            }
            .confirm-box .confirm-actions {
                display: flex;
                gap: 10px;
                justify-content: center;
            }
            .confirm-box .confirm-actions button {
                min-width: 100px;
            }

            @media (max-width: 480px) {
                .history-item {
                    flex-direction: column;
                    align-items: flex-start;
                    gap: 8px;
                }
                .history-item-actions {
                    margin-left: 0;
                    width: 100%;
                }
                .history-item-actions button {
                    flex: 1;
                }
                .form-row:not(.form-row-inline) {
                    flex-direction: column;
                }
                #btnGenRows {
                    width: 100%;
                }
                .modal-buttons {
                    flex-direction: column;
                }
                .modal-buttons button {
                    min-width: unset;
                    width: 100%;
                }
                .entry-table.card {
                    padding: 12px 8px;
                    overflow-x: auto;
                }
                .entry-table td,
                .entry-table thead th {
                    padding: 6px 4px;
                }
            }
        </style>
    </head>
    <body>
        <!-- Header -->
        <div class="app-header">
            <h1>Overtime Record Generator</h1>
            <p>
                Fill in details, adjust your entries, then generate a
                downloadable image.
            </p>
        </div>

        <!-- Controls -->
        <div class="card">
            <div class="card-title">Employee Details</div>
            <div class="form-row">
                <label
                    >Employee Name
                    <select id="empNameSelect">
                        <option value="">-- Select Employee --</option>
                        <option value="Marvin Canezo">Marvin Canezo</option>
                        <option value="Danica Santa Isabel">
                            Danica Santa Isabel
                        </option>
                        <option value="Alden Betito">Alden Betito</option>
                        <option value="__custom__">
                            Other (Enter manually)
                        </option>
                    </select>
                    <input
                        type="text"
                        id="empNameCustom"
                        class="custom-name-input"
                        placeholder="Enter employee name"
                    />
                </label>
                <label
                    >Position<input
                        type="text"
                        id="empPosition"
                        placeholder="e.g. Draftsman"
                /></label>
            </div>
            <div class="card-title" style="margin-top: 20px">Date Range</div>
            <div class="form-row form-row-inline">
                <label>Start Date<input type="date" id="startDate" /></label>
                <label>End Date<input type="date" id="endDate" /></label>
            </div>
            <div class="form-row" style="margin-top: 8px">
                <label
                    >Time Out
                    <div class="time-picker">
                        <select id="toHour"></select>
                        <span class="time-sep">:</span>
                        <select id="toMinute"></select>
                        <select id="toAmpm"></select>
                    </div>
                </label>
            </div>
            <div style="margin-top: 8px">
                <label
                    style="
                        display: inline-flex;
                        align-items: center;
                        gap: 6px;
                        font-size: 13px;
                        cursor: pointer;
                    "
                >
                    <input type="checkbox" id="excludeSundays" /> Exclude
                    Sundays
                </label>
            </div>
            <div style="margin-top: 8px; text-align: center">
                <button id="btnGenRows">Generate Rows</button>
            </div>
        </div>

        <!-- Editable entry table -->
        <div class="card entry-table" id="entrySection">
            <div class="card-title">Overtime Entries</div>
            <table>
                <thead>
                    <tr>
                        <th style="width: 110px">Date</th>
                        <th style="width: 120px">End Time</th>
                        <th style="width: 120px">No. of Hours</th>
                        <th>Notes</th>
                        <th style="width: 50px"></th>
                    </tr>
                </thead>
                <tbody id="entryBody"></tbody>
                <tfoot>
                    <tr class="total-row">
                        <td colspan="2" style="text-align: right">TOTAL</td>
                        <td class="total-value" id="totalHours">0 HOURS</td>
                        <td colspan="2"></td>
                    </tr>
                </tfoot>
            </table>
            <div class="actions" id="actionsSection" style="margin-top: 16px">
                <button class="cancel" id="btnReset">Reset</button>
                <button id="btnSaveDraft">Save Draft</button>
                <button class="green" id="btnGenImage">Generate Image</button>
            </div>
        </div>

        <!-- History -->
        <div class="card" id="historySection" style="display: none">
            <div class="card-title">History</div>
            <ul class="history-list" id="historyList"></ul>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast"></div>

        <!-- Confirm dialog -->
        <div class="confirm-overlay" id="confirmOverlay">
            <div class="confirm-box">
                <p id="confirmMsg"></p>
                <div class="confirm-actions">
                    <button class="cancel" id="confirmNo">Cancel</button>
                    <button id="confirmYes">Confirm</button>
                </div>
            </div>
        </div>

        <!-- Preview modal -->
        <div class="modal-overlay" id="previewModal">
            <div class="modal">
                <h2>Preview</h2>
                <img id="previewImg" src="" alt="Preview" />
                <div class="modal-buttons">
                    <button class="green" id="btnDownloadImg">
                        Download as Image
                    </button>
                    <button id="btnDownloadPdf">Download as PDF (A4)</button>
                    <button class="cancel" id="btnCancel">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Off-screen render target for html2canvas -->
        <div id="render-target"></div>

        <script>
            let toastTimer;
            function showToast(msg, type) {
                const t = document.getElementById('toast');
                t.textContent = msg;
                t.className = 'toast' + (type ? ' toast-' + type : '');
                clearTimeout(toastTimer);
                requestAnimationFrame(() => {
                    t.classList.add('show');
                    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
                });
            }

            function showConfirm(msg) {
                return new Promise((resolve) => {
                    const overlay = document.getElementById('confirmOverlay');
                    document.getElementById('confirmMsg').textContent = msg;
                    overlay.classList.add('open');
                    const yes = document.getElementById('confirmYes');
                    const no = document.getElementById('confirmNo');
                    function cleanup(result) {
                        overlay.classList.remove('open');
                        yes.removeEventListener('click', onYes);
                        no.removeEventListener('click', onNo);
                        overlay.removeEventListener('click', onBg);
                        resolve(result);
                    }
                    function onYes() { cleanup(true); }
                    function onNo() { cleanup(false); }
                    function onBg(e) { if (e.target === overlay) cleanup(false); }
                    yes.addEventListener('click', onYes);
                    no.addEventListener('click', onNo);
                    overlay.addEventListener('click', onBg);
                });
            }

            function getOTStart() {
                const h = parseInt(document.getElementById("toHour").value);
                const m = parseInt(document.getElementById("toMinute").value);
                const ap = document.getElementById("toAmpm").value;
                let h24 = h;
                if (ap === "AM" && h === 12) h24 = 0;
                else if (ap === "PM" && h !== 12) h24 = h + 12;
                return { h: h24, m };
            }

            const employeeData = {
                "Marvin Canezo": "Draftsman",
                "Danica Santa Isabel": "Architect",
                "Alden Betito": "Project Engineer",
            };

            const empNameSelect = document.getElementById("empNameSelect");
            const empNameCustom = document.getElementById("empNameCustom");
            const empPosition = document.getElementById("empPosition");

            empNameSelect.addEventListener("change", () => {
                const val = empNameSelect.value;
                if (val === "__custom__") {
                    empNameCustom.classList.add("visible");
                    empNameCustom.value = "";
                    empPosition.value = "";
                    empNameCustom.focus();
                } else {
                    empNameCustom.classList.remove("visible");
                    empNameCustom.value = "";
                    empPosition.value = employeeData[val] || "";
                }
                saveDraft();
            });
            empNameCustom.addEventListener("input", saveDraft);
            empPosition.addEventListener("input", saveDraft);
            document
                .getElementById("startDate")
                .addEventListener("change", saveDraft);
            document
                .getElementById("endDate")
                .addEventListener("change", saveDraft);
            document
                .getElementById("excludeSundays")
                .addEventListener("change", saveDraft);

            function getEmployeeName() {
                if (empNameSelect.value === "__custom__") {
                    return empNameCustom.value;
                }
                return empNameSelect.value;
            }

            document
                .getElementById("btnGenRows")
                .addEventListener("click", generateRows);
            document
                .getElementById("btnGenImage")
                .addEventListener("click", generateImage);
            document
                .getElementById("btnSaveDraft")
                .addEventListener("click", () => {
                    saveDraft();
                    showToast("Draft saved!", "success");
                });
            document
                .getElementById("btnReset")
                .addEventListener("click", async () => {
                    if (!(await showConfirm("Reset all fields and clear saved draft?")))
                        return;
                    localStorage.removeItem("overtimeDraft");
                    empNameSelect.value = "";
                    empNameCustom.classList.remove("visible");
                    empNameCustom.value = "";
                    empPosition.value = "";
                    document.getElementById("startDate").value = "";
                    document.getElementById("endDate").value = "";
                    document.getElementById("excludeSundays").checked = false;
                    document.getElementById("entryBody").innerHTML = "";
                    document.getElementById("totalHours").textContent = "0";
                    document.getElementById("entrySection").style.display =
                        "none";
                    document.getElementById("actionsSection").style.display =
                        "none";
                });

            function saveDraft() {
                const draft = {
                    empName: empNameSelect.value,
                    empNameCustom: empNameCustom.value,
                    empPosition: empPosition.value,
                    startDate: document.getElementById("startDate").value,
                    endDate: document.getElementById("endDate").value,
                    excludeSundays:
                        document.getElementById("excludeSundays").checked,
                    toHour: document.getElementById("toHour").value,
                    toMinute: document.getElementById("toMinute").value,
                    toAmpm: document.getElementById("toAmpm").value,
                    rows: [],
                };
                document.querySelectorAll("#entryBody tr").forEach((tr) => {
                    draft.rows.push({
                        date: tr.children[0].textContent,
                        hour: tr.querySelector(".time-hour").value,
                        minute: tr.querySelector(".time-minute").value,
                        ampm: tr.querySelector(".time-ampm").value,
                        notes: tr.querySelector(".notes-input").value,
                    });
                });
                localStorage.setItem("overtimeDraft", JSON.stringify(draft));
            }

            function loadDraft() {
                const raw = localStorage.getItem("overtimeDraft");
                if (!raw) return;
                try {
                    const draft = JSON.parse(raw);
                    empNameSelect.value = draft.empName || "";
                    if (draft.empName === "__custom__") {
                        empNameCustom.classList.add("visible");
                        empNameCustom.value = draft.empNameCustom || "";
                    }
                    empPosition.value = draft.empPosition || "";
                    document.getElementById("startDate").value =
                        draft.startDate || "";
                    document.getElementById("endDate").value =
                        draft.endDate || "";
                    document.getElementById("excludeSundays").checked =
                        !!draft.excludeSundays;
                    if (draft.toHour)
                        document.getElementById("toHour").value = draft.toHour;
                    if (draft.toMinute)
                        document.getElementById("toMinute").value =
                            draft.toMinute;
                    if (draft.toAmpm)
                        document.getElementById("toAmpm").value = draft.toAmpm;

                    if (draft.rows && draft.rows.length > 0) {
                        const tbody = document.getElementById("entryBody");
                        tbody.innerHTML = "";
                        draft.rows.forEach((r) => {
                            addRow(tbody, r.date, r);
                        });
                        recalcAll();
                        document.getElementById("entrySection").style.display =
                            "block";
                        document.getElementById(
                            "actionsSection",
                        ).style.display = "block";
                    }
                } catch (e) {}
            }

            // Populate Time Out selects and set default to 5:00 PM
            document.getElementById("toHour").innerHTML =
                buildTimeOptions("hour");
            document.getElementById("toMinute").innerHTML =
                buildTimeOptions("minute");
            document.getElementById("toAmpm").innerHTML =
                buildTimeOptions("ampm");
            document.getElementById("toHour").value = "5";
            document.getElementById("toMinute").value = "0";
            document.getElementById("toAmpm").value = "PM";

            document.getElementById("toHour").addEventListener("change", () => {
                recalcAll();
                saveDraft();
            });
            document
                .getElementById("toMinute")
                .addEventListener("change", () => {
                    recalcAll();
                    saveDraft();
                });
            document.getElementById("toAmpm").addEventListener("change", () => {
                recalcAll();
                saveDraft();
            });

            loadDraft();

            function generateRows() {
                const start = document.getElementById("startDate").value;
                const end = document.getElementById("endDate").value;
                if (!start || !end) {
                    showToast("Please select both start and end dates.", "error");
                    return;
                }

                const startD = new Date(start + "T00:00:00");
                const endD = new Date(end + "T00:00:00");
                if (endD < startD) {
                    showToast("End date must be on or after start date.", "error");
                    return;
                }

                const tbody = document.getElementById("entryBody");
                tbody.innerHTML = "";

                const skipSun =
                    document.getElementById("excludeSundays").checked;
                const cur = new Date(startD);
                while (cur <= endD) {
                    if (!skipSun || cur.getDay() !== 0) {
                        const dateStr = formatDateUS(cur);
                        addRow(tbody, dateStr);
                    }
                    cur.setDate(cur.getDate() + 1);
                }

                recalcAll();
                saveDraft();

                document.getElementById("entrySection").style.display = "block";
                document.getElementById("actionsSection").style.display =
                    "block";
            }

            function buildTimeOptions(type) {
                let opts = "";
                if (type === "hour") {
                    for (let i = 1; i <= 12; i++)
                        opts += `<option value="${i}">${i}</option>`;
                } else if (type === "minute") {
                    for (let i = 0; i < 60; i++)
                        opts += `<option value="${i}">${String(i).padStart(2, "0")}</option>`;
                } else {
                    opts =
                        '<option value="AM">AM</option><option value="PM">PM</option>';
                }
                return opts;
            }

            function getEndTime24(tr) {
                const h = parseInt(tr.querySelector(".time-hour").value);
                const m = parseInt(tr.querySelector(".time-minute").value);
                const ap = tr.querySelector(".time-ampm").value;
                let h24 = h;
                if (ap === "AM" && h === 12) h24 = 0;
                else if (ap === "PM" && h !== 12) h24 = h + 12;
                return { h: h24, m };
            }

            function addRow(tbody, dateStr, opts) {
                const o = opts || {
                    hour: "7",
                    minute: "0",
                    ampm: "PM",
                    notes: "",
                };
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${dateStr}</td>
                    <td><div class="time-picker">
                        <select class="time-hour">${buildTimeOptions("hour")}</select>
                        <span class="time-sep">:</span>
                        <select class="time-minute">${buildTimeOptions("minute")}</select>
                        <select class="time-ampm">${buildTimeOptions("ampm")}</select>
                    </div></td>
                    <td class="hours-cell"></td>
                    <td><input type="text" class="notes-input" placeholder="" value="${escHtml(o.notes || "")}"></td>
                    <td><button class="btn-remove" title="Remove this date">&times;</button></td>
                `;
                tr.querySelector(".time-hour").value = o.hour;
                tr.querySelector(".time-minute").value = o.minute;
                tr.querySelector(".time-ampm").value = o.ampm;

                tr.querySelectorAll(
                    ".time-hour, .time-minute, .time-ampm",
                ).forEach((sel) =>
                    sel.addEventListener("change", () => {
                        recalcAll();
                        saveDraft();
                    }),
                );
                tr.querySelector(".notes-input").addEventListener(
                    "input",
                    saveDraft,
                );
                tr.querySelector(".btn-remove").addEventListener(
                    "click",
                    () => {
                        tr.remove();
                        recalcAll();
                        saveDraft();
                    },
                );
                tbody.appendChild(tr);
            }

            function recalcAll() {
                const otStart = getOTStart();
                let total = 0;
                document.querySelectorAll("#entryBody tr").forEach((tr) => {
                    const cell = tr.querySelector(".hours-cell");
                    const { h, m } = getEndTime24(tr);
                    const endMin = h * 60 + m;
                    const startMin = otStart.h * 60 + otStart.m;
                    let diff = endMin - startMin;
                    if (diff <= 0) {
                        cell.textContent = "";
                        return;
                    }
                    const hours = diff / 60;
                    total += hours;
                    cell.textContent = hours;
                });
                document.getElementById("totalHours").textContent = total;
            }

            function formatDateUS(d) {
                return (
                    d.getMonth() + 1 + "/" + d.getDate() + "/" + d.getFullYear()
                );
            }

            function to12hr(h, m) {
                const ap = h >= 12 ? "PM" : "AM";
                let h12 = h % 12;
                if (h12 === 0) h12 = 12;
                return h12 + ":" + String(m).padStart(2, "0") + " " + ap;
            }

            function formatTimeRange(h24, m) {
                const otStart = getOTStart();
                return to12hr(otStart.h, otStart.m) + "-" + to12hr(h24, m);
            }

            function generateImage() {
                const name = getEmployeeName() || "EMPLOYEE NAME";
                const position =
                    document.getElementById("empPosition").value || "Position";

                const otStart = getOTStart();
                const rows = [];
                document.querySelectorAll("#entryBody tr").forEach((tr) => {
                    const { h, m } = getEndTime24(tr);
                    const diff = h * 60 + m - (otStart.h * 60 + otStart.m);
                    if (diff <= 0) return;
                    const date = tr.children[0].textContent;
                    const hours = diff / 60;
                    const notes = tr.querySelector(".notes-input").value;
                    rows.push({
                        date,
                        time: formatTimeRange(h, m),
                        hours,
                        notes,
                    });
                });

                const totalHours = rows.reduce((s, r) => s + r.hours, 0);

                // Build render target HTML
                const target = document.getElementById("render-target");
                let html = "";
                html += `<div class="title">OVER TIME RECORD</div>`;
                html += `<div class="info">EMPLOYEE NAME: ${escHtml(name.toUpperCase())}</div>`;
                html += `<div class="info">Position: ${escHtml(position)}</div>`;
                html += `<table>`;
                html += `<thead><tr><th style="width:100px">DATE</th><th style="width:120px">TIME</th><th style="width:120px">NO.OF HOURS</th><th>NOTES</th></tr></thead>`;
                html += `<tbody>`;
                rows.forEach((r) => {
                    html += `<tr><td>${r.date}</td><td>${r.time}</td><td>${r.hours} HOURS</td><td style="text-align:left;padding-left:10px">${escHtml(r.notes)}</td></tr>`;
                });
                const minRows = 4;
                for (let i = rows.length; i < minRows; i++) {
                    html += `<tr><td>&nbsp;</td><td></td><td></td><td></td></tr>`;
                }
                html += `<tr><td></td><td style="font-weight:700">TOTAL</td><td style="font-weight:700">${totalHours} HOURS</td><td></td></tr>`;
                html += `</tbody></table>`;
                html += `<div class="footer"><div>Prepared by:</div><div class="name">${escHtml(name.toUpperCase())}</div></div>`;

                target.innerHTML = html;

                html2canvas(target, {
                    scale: 2,
                    backgroundColor: "#ffffff",
                }).then((canvas) => {
                    const dataUrl = canvas.toDataURL("image/png");
                    document.getElementById("previewImg").src = dataUrl;
                    document
                        .getElementById("previewModal")
                        .classList.add("open");

                    // Download as Image
                    document.getElementById("btnDownloadImg").onclick = () => {
                        saveToHistory();
                        const link = document.createElement("a");
                        link.download = "overtime-record.png";
                        link.href = dataUrl;
                        link.click();
                        document
                            .getElementById("previewModal")
                            .classList.remove("open");
                    };

                    // Download as PDF (A4)
                    document.getElementById("btnDownloadPdf").onclick = () => {
                        saveToHistory();
                        const { jsPDF } = window.jspdf;
                        const pdf = new jsPDF("p", "mm", "a4");
                        const pageWidth = pdf.internal.pageSize.getWidth();
                        const pageHeight = pdf.internal.pageSize.getHeight();
                        const margin = 20;
                        const usableWidth = pageWidth - margin * 2;

                        const imgWidth = canvas.width;
                        const imgHeight = canvas.height;
                        const ratio = usableWidth / imgWidth;
                        const pdfImgHeight = imgHeight * ratio;

                        const yOffset = margin;

                        pdf.addImage(
                            dataUrl,
                            "PNG",
                            margin,
                            yOffset,
                            usableWidth,
                            pdfImgHeight,
                        );
                        pdf.save("overtime-record.pdf");
                        document
                            .getElementById("previewModal")
                            .classList.remove("open");
                    };
                });
            }

            document
                .getElementById("btnCancel")
                .addEventListener("click", () => {
                    document
                        .getElementById("previewModal")
                        .classList.remove("open");
                });

            document
                .getElementById("previewModal")
                .addEventListener("click", (e) => {
                    if (e.target === e.currentTarget) {
                        e.currentTarget.classList.remove("open");
                    }
                });

            function escHtml(str) {
                const d = document.createElement("div");
                d.textContent = str;
                return d.innerHTML;
            }

            // ---- History ----
            function getHistory() {
                try {
                    return JSON.parse(
                        localStorage.getItem("overtimeHistory") || "[]",
                    );
                } catch {
                    return [];
                }
            }

            function saveToHistory() {
                const name = getEmployeeName() || "Unknown";
                const position =
                    document.getElementById("empPosition").value || "";
                const otStart = getOTStart();
                const entryRows = [];
                document.querySelectorAll("#entryBody tr").forEach((tr) => {
                    entryRows.push({
                        date: tr.children[0].textContent,
                        hour: tr.querySelector(".time-hour").value,
                        minute: tr.querySelector(".time-minute").value,
                        ampm: tr.querySelector(".time-ampm").value,
                        notes: tr.querySelector(".notes-input").value,
                    });
                });
                const totalHours =
                    parseFloat(
                        document.getElementById("totalHours").textContent,
                    ) || 0;
                const record = {
                    id: Date.now(),
                    savedAt: new Date().toLocaleString(),
                    name,
                    position,
                    totalHours,
                    toHour: document.getElementById("toHour").value,
                    toMinute: document.getElementById("toMinute").value,
                    toAmpm: document.getElementById("toAmpm").value,
                    startDate: document.getElementById("startDate").value,
                    endDate: document.getElementById("endDate").value,
                    excludeSundays:
                        document.getElementById("excludeSundays").checked,
                    rows: entryRows,
                };
                const history = getHistory();
                history.unshift(record);
                localStorage.setItem(
                    "overtimeHistory",
                    JSON.stringify(history),
                );
                renderHistory();
            }

            async function deleteFromHistory(id) {
                if (!(await showConfirm("Delete this record from history?"))) return;
                const history = getHistory().filter((r) => r.id !== id);
                localStorage.setItem(
                    "overtimeHistory",
                    JSON.stringify(history),
                );
                renderHistory();
            }

            function loadFromHistory(id) {
                const record = getHistory().find((r) => r.id === id);
                if (!record) return;
                // Fill employee info
                const isKnown = Object.keys(employeeData).includes(record.name);
                if (isKnown) {
                    empNameSelect.value = record.name;
                    empNameCustom.classList.remove("visible");
                    empNameCustom.value = "";
                } else {
                    empNameSelect.value = "__custom__";
                    empNameCustom.classList.add("visible");
                    empNameCustom.value = record.name;
                }
                empPosition.value = record.position || "";
                document.getElementById("startDate").value =
                    record.startDate || "";
                document.getElementById("endDate").value = record.endDate || "";
                document.getElementById("excludeSundays").checked =
                    !!record.excludeSundays;
                if (record.toHour)
                    document.getElementById("toHour").value = record.toHour;
                if (record.toMinute)
                    document.getElementById("toMinute").value = record.toMinute;
                if (record.toAmpm)
                    document.getElementById("toAmpm").value = record.toAmpm;

                // Rebuild rows
                const tbody = document.getElementById("entryBody");
                tbody.innerHTML = "";
                (record.rows || []).forEach((r) => addRow(tbody, r.date, r));
                recalcAll();
                saveDraft();
                document.getElementById("entrySection").style.display = "block";
                document.getElementById("actionsSection").style.display =
                    "block";
                window.scrollTo({ top: 0, behavior: "smooth" });
            }

            function renderHistory() {
                const history = getHistory();
                const section = document.getElementById("historySection");
                const list = document.getElementById("historyList");
                if (history.length === 0) {
                    section.style.display = "none";
                    return;
                }
                section.style.display = "block";
                list.innerHTML = history
                    .map(
                        (r) => `
                    <li class="history-item">
                        <div class="history-item-info">
                            <div class="history-item-name">${escHtml(r.name)}</div>
                            <div class="history-item-meta">${escHtml(r.savedAt)} &middot; ${r.totalHours} Hours &middot; ${r.rows ? r.rows.length : 0} entries</div>
                        </div>
                        <div class="history-item-actions">
                            <button onclick="loadFromHistory(${r.id})">Load</button>
                            <button class="cancel" onclick="deleteFromHistory(${r.id})">Delete</button>
                        </div>
                    </li>
                `,
                    )
                    .join("");
            }

            renderHistory();

            // Register service worker
            if ("serviceWorker" in navigator) {
                navigator.serviceWorker.register("./sw.js");
            }
        </script>
    </body>
</html>
